name: Copy PR info to testing→main PR

on:
  pull_request:
    types: [opened]
    branches:
      - main

jobs:
  copy-pr-info:
    if: github.head_ref == 'testing'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Find the most recently merged PR into testing
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'testing',
              sort: 'updated',
              direction: 'desc',
              per_page: 10
            });

            const merged = prs.find(pr => pr.merged_at !== null);
            if (!merged) {
              core.info('No merged PR found targeting testing — skipping.');
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              title: merged.title,
              body: merged.body ?? ''
            });

            core.info(`Copied title and body from PR #${merged.number}: "${merged.title}"`);
